<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 48" width="260" height="48">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700&family=DM+Sans:wght@300&display=swap');
    </style>
  </defs>
  <!-- Sine wave icon: three stacked sinusoidal lines -->
  <g transform="translate(4, 8)">
    <!-- Wave 1 (top) -->
    <path d="M0,6 C4,2 8,10 12,6 C16,2 20,10 24,6 C28,2 32,10 36,6" stroke="#00E5A0" stroke-width="1.8" fill="none" stroke-linecap="round"/>
    <!-- Wave 2 (middle) -->
    <path d="M0,16 C4,12 8,20 12,16 C16,12 20,20 24,16 C28,12 32,20 36,16" stroke="#00E5A0" stroke-width="1.8" fill="none" stroke-linecap="round"/>
    <!-- Wave 3 (bottom) -->
    <path d="M0,26 C4,22 8,30 12,26 C16,22 20,30 24,26 C28,22 32,30 36,26" stroke="#00E5A0" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  </g>
  <!-- "Super" text in DM Sans 300 -->
  <text x="48" y="31" font-family="'DM Sans', sans-serif" font-weight="300" font-size="22" fill="#F0F0F5" letter-spacing="0.5">Super</text>
  <!-- "Sensors" text in Syne 700 -->
  <text x="104" y="31" font-family="'Syne', sans-serif" font-weight="700" font-size="22" fill="#00E5A0" letter-spacing="0.5">Sensors</text>
</svg>
