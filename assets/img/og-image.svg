<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="heroBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A0A0F"/>
      <stop offset="100%" style="stop-color:#111118"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00E5A0"/>
      <stop offset="100%" style="stop-color:#0066FF"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#00E5A0;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#00E5A0;stop-opacity:0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#heroBg)"/>
  <circle cx="600" cy="315" r="400" fill="url(#glow)"/>
  <!-- Decorative sine waves -->
  <g opacity="0.15">
    <path d="M0,180 C80,140 160,220 240,180 C320,140 400,220 480,180 C560,140 640,220 720,180 C800,140 880,220 960,180 C1040,140 1120,220 1200,180" stroke="#00E5A0" stroke-width="2" fill="none"/>
    <path d="M0,220 C80,180 160,260 240,220 C320,180 400,260 480,220 C560,180 640,260 720,220 C800,180 880,260 960,220 C1040,180 1120,260 1200,220" stroke="#00E5A0" stroke-width="2" fill="none"/>
    <path d="M0,260 C80,220 160,300 240,260 C320,220 400,300 480,260 C560,220 640,300 720,260 C800,220 880,300 960,260 C1040,220 1120,300 1200,260" stroke="#00E5A0" stroke-width="2" fill="none"/>
    <path d="M0,400 C80,360 160,440 240,400 C320,360 400,440 480,400 C560,360 640,440 720,400 C800,360 880,440 960,400 C1040,360 1120,440 1200,400" stroke="#0066FF" stroke-width="2" fill="none"/>
    <path d="M0,440 C80,400 160,480 240,440 C320,400 400,480 480,440 C560,400 640,480 720,440 C800,400 880,480 960,440 C1040,400 1120,480 1200,440" stroke="#0066FF" stroke-width="2" fill="none"/>
  </g>
  <!-- Logo area -->
  <text x="600" y="280" font-family="'DM Sans', sans-serif" font-weight="300" font-size="64" fill="#F0F0F5" text-anchor="middle">Super</text>
  <text x="600" y="355" font-family="'Syne', sans-serif" font-weight="700" font-size="72" fill="#00E5A0" text-anchor="middle">Sensors</text>
  <!-- Gradient underline -->
  <rect x="300" y="375" width="600" height="3" fill="url(#accentGrad)" rx="2"/>
  <!-- Tagline -->
  <text x="600" y="430" font-family="'DM Sans', sans-serif" font-weight="300" font-size="28" fill="#7A7A9A" text-anchor="middle">Breath data, decoded.</text>
  <!-- URL -->
  <text x="600" y="590" font-family="'DM Sans', sans-serif" font-weight="400" font-size="20" fill="#7A7A9A" text-anchor="middle">supersensors.ai</text>
</svg>
